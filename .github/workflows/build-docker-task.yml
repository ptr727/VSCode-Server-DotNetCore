name: Build Docker image task

on:
  workflow_call:
    inputs:
      # Input to control whether to push the Docker image to Docker Hub
      push:
        required: false
        type: boolean
        default: false
      # Git ref to check out / version (empty = default checkout ref).
      ref:
        required: false
        type: string
        default: ''
      # Logical branch driving tags (main => latest, otherwise develop). Required (no
      # github.ref_name fallback): the publisher builds develop from a main-ref run, so a fallback would mistag it.
      branch:
        required: true
        type: string
      # Smoke mode: build linux/amd64 only (no QEMU/arm64), never push, and skip the shared registry cache-to so PR
      # builds don't pollute the release buildcache. Used for fast PR feedback.
      smoke:
        required: false
        type: boolean
        default: false

jobs:

  get-version:
    name: Get version information job
    uses: ./.github/workflows/get-version-task.yml
    secrets: inherit
    with:
      ref: ${{ inputs.ref }}

  build-docker:
    name: Build Docker image job
    runs-on: ubuntu-latest
    needs: [get-version]

    steps:

      - name: Checkout step
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      # QEMU only emulates arm64; smoke builds are amd64-only, so skip it to save setup cost.
      - name: Setup QEMU step
        if: ${{ !inputs.smoke }}
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          platforms: linux/amd64,linux/arm64

      - name: Setup Buildx step
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          platforms: ${{ inputs.smoke && 'linux/amd64' || 'linux/amd64,linux/arm64' }}

      # Always login (even for smoke) for the higher Docker rate limits on pulls/cache reads; fork PRs without the
      # secrets can't run the Docker smoke build, acceptable for same-repo PRs.
      - name: Login to Docker Hub step
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Image builds from the LSIO code-server base and installs the .NET SDKs via dotnet-install.sh; only LABEL_VERSION
      # is consumed (no local source build), so the template's source-build args do not apply.
      - name: Docker build and push step
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: ${{ inputs.push }}
          file: ./Dockerfile
          tags: |
            docker.io/ptr727/vscode-server-dotnetcore:${{ inputs.branch == 'main' && 'latest' || 'develop' }}
            docker.io/ptr727/vscode-server-dotnetcore:${{ needs.get-version.outputs.SemVer2 }}
          platforms: ${{ inputs.smoke && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          # Read both branches' caches (near-identical layers) but write only this branch's tag, and only when
          # pushing, so the weekly main+develop matrix legs don't overwrite one shared cache.
          cache-from: |
            type=registry,ref=docker.io/ptr727/vscode-server-dotnetcore:buildcache-main
            type=registry,ref=docker.io/ptr727/vscode-server-dotnetcore:buildcache-develop
          cache-to: ${{ inputs.push && format('type=registry,ref=docker.io/ptr727/vscode-server-dotnetcore:buildcache-{0},mode=max,ignore-error=true', inputs.branch) || '' }}
          build-args: |
            LABEL_VERSION=${{ needs.get-version.outputs.SemVer2 }}
