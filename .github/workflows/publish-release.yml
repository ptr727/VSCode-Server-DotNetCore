name: Publish project release action

# Scheduled + on-demand publisher, one run = one branch (the trigger ref). The weekly schedule rebuilds
# `main` only (refreshing the `latest` image for base-image CVEs); a manual dispatch publishes the branch it
# is dispatched from (main => stable/`latest`, develop => prerelease/`develop`). Building only the trigger
# branch keeps github.ref aligned with the branch being versioned, so NBGV classifies it correctly with no
# matrix and no cross-branch ref leak.
#
# Merges do NOT publish: accumulated changes (mostly Dependabot bumps) ship in the next scheduled run, which
# also refreshes the base image (lscr.io/linuxserver/code-server). To release develop, dispatch this workflow
# from the develop branch. CI/validation runs separately on push (test-pull-request); this never runs on push.
on:
  workflow_dispatch:
  schedule:
    # Weekly rebuild/publish of main (Mon 02:00 UTC) to pick up base-image updates.
    - cron: '0 2 * * MON'

# Global, ref-independent group so two publishes never overlap (a schedule + a manual dispatch, or back-to-back
# dispatches). cancel-in-progress: false so a publish is never cancelled mid-release.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:

  # Publish the trigger branch in full (Docker + GitHub release). The schedule always runs on the default
  # branch (main); a dispatch runs on whatever branch it is started from. build-release-task validates,
  # versions, and tags that one branch; the no-op guard skips release creation when the version is unchanged
  # while the Docker push still refreshes the base image.
  publish:
    name: Publish project release job
    # Only the long-lived branches publish; a stray dispatch from a feature branch is a no-op.
    if: ${{ github.ref_name == 'main' || github.ref_name == 'develop' }}
    uses: ./.github/workflows/build-release-task.yml
    secrets: inherit
    permissions:
      contents: write
    with:
      ref: ${{ github.ref_name }}
      branch: ${{ github.ref_name }}
      smoke: false
      github: true
      dockerhub: true
