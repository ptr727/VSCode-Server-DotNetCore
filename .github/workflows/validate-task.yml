name: Validate task

# The validation gate: lint the docs and workflows (markdownlint, cspell, actionlint). No unit tests or C#
# formatting - this repo has no compiled code. Reused by test-pull-request (produces the required check) and
# the publish run, so the CI and publish gates are identical.
on:
  workflow_call:
    inputs:
      # Git ref to validate (empty = default checkout ref). The publisher passes each branch so its leg
      # validates the branch it publishes.
      ref:
        required: false
        type: string
        default: ''

jobs:

  lint:
    name: Lint job
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code step
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - name: Lint markdown step
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: '**/*.md'

      # Spell-check the user-facing docs; word list + exclusions live in cspell.json (shared with the editor).
      - name: Spell check step
        uses: streetsidesoftware/cspell-action@de2a73e963e7443969755b648a1008f77033c5b2 # v8.4.0
        with:
          files: |
            README.md
            HISTORY.md
          incremental_files_only: false

      # Lint workflow YAML (actionlint bundles shellcheck).
      - name: Lint workflows step
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0
